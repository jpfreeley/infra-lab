name: 🐛 Bug Report
description: Report a problem in the infrastructure or automation.
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to fill out this bug report!
  - type: textarea
    id: description
    attributes:
      label: Description
      description: A clear and concise description of what the bug is.
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Relevant Logs or Output
      description: Please provide relevant Terraform or script output.
      render: shell
