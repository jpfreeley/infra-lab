name: "Scripts CI"

on:
  pull_request:
    branches: [ main ]
    paths:
      - 'scripts/**'
      - '.github/workflows/scripts-ci.yml'
  push:
    branches: [ main ]
    paths:
      - 'scripts/**'

permissions:
  contents: read

jobs:
  shellcheck:
    name: "ShellCheck"
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run ShellCheck
        uses: reviewdog/action-shellcheck@v1
        with:
          reporter: github-pr-review
          level: warning
          filter_mode: added
          fail_on_error: false
          shellcheck_flags: "-x"
          path: scripts/
          pattern: "*.sh"
